<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Horizon Runner</title>
  <!-- Tailwind play CDN — both games use Tailwind utility classes throughout -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Babel standalone for in-browser JSX transpile (the games are React .jsx) -->
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
  <!-- React 18 + lucide-react resolved via esm.sh import map. esm.sh delivers
       per-icon tree-shaken modules and pins React so every package shares one
       copy (avoids the "Invalid hook call" duplicate-React trap). -->
  <script type="importmap">
  {
    "imports": {
      "react":             "https://esm.sh/react@18.3.1",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "react-dom":         "https://esm.sh/react-dom@18.3.1",
      "react-dom/client":  "https://esm.sh/react-dom@18.3.1/client",
      "lucide-react":      "https://esm.sh/lucide-react@0.400.0?external=react"
    }
  }
  </script>
  <style>
    /* 2026-05-08 — Same fix as block-breaker. Canvas internal resolution is
       FIXED at 1280x720 (16:9). The #root wrapper enforces aspect ratio +
       max-width/height so the game scales to fit any viewport (small embed
       iframe, fullscreen, ultrawide) with letterbox margins instead of
       reflowing the in-game world coords. Side margins in normal embed
       become ad slots later; F key (or the portal expand button) goes
       full-bleed via Fullscreen API. */
    html, body { margin:0; padding:0; height:100%; width:100%;
                 background:#000; color:#fff;
                 font-family: 'Lexend', system-ui, -apple-system, sans-serif;
                 overflow:hidden;
                 display:flex; align-items:center; justify-content:center; }
    /* 2026-05-11 — #root needs EXPLICIT dimensions, not aspect-ratio alone.
       The React app inside positions everything with `absolute inset-0`,
       which doesn't define the parent's size — so width:auto collapsed
       the box to ~50×30 px and the whole game rendered into a thumbnail.
       Compute the largest 16:9 rectangle that fits the viewport (letterboxed
       on tall screens, pillarboxed on wide ones). The two min() calls give
       width = min(100vw, 100vh * 16/9) and height = min(100vh, 100vw * 9/16).
       Equivalent in CSS, no JS needed. */
    #root { width:  min(100vw, calc(100vh * 16 / 9));
            height: min(100vh, calc(100vw *  9 / 16));
            background:#0f172a; position:relative;
            overflow:hidden; }
    /* 2026-05-11 — Force the React app's outermost div to fill #root. The
       Tailwind `min-h-screen` on that div fixes its HEIGHT to 100vh, but
       width was auto (collapsed to natural content width) which made the
       game render in a small column in the center of #root with purple
       gradient flanking it.
       Also allow vertical scroll so tall menus (level-select list etc.)
       don't get clipped by the 16:9 container — was cutting off the
       "Current Progress" heading on Sky Battle's level picker. */
    #root > * { width: 100% !important; height: 100% !important;
                min-height: 100% !important; max-width: 100% !important;
                overflow-y: auto !important;
                /* Hide scrollbar but keep scroll behavior. Cross-browser:
                   IE/Edge legacy + Firefox + WebKit. Tailwind classes
                   inside the games are inconsistent, so enforce here. */
                scrollbar-width: none;
                -ms-overflow-style: none; }
    #root > *::-webkit-scrollbar,
    #root *::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }
    /* 2026-05-11 — Canvas HTML `width`/`height` attributes set BOTH the
       drawing buffer AND the CSS display size. With width=1280/height=720
       attributes the canvas was displaying at 1280x720 inside a 2048x1152
       parent (only ~62% of the visible game frame). Override the display
       size so Tailwind `absolute inset-0` actually stretches it to the
       parent. The drawing buffer stays 1280x720 (game logic depends on
       that for world coords); browser scales it up to fill the display. */
    #root canvas { width: 100% !important; height: 100% !important; }
    /* 2026-05-11 — When the React component switches to "playing" state
       it wraps its content in `fixed inset-0` to overlay the screen.
       In an iframe that's relative to the iframe viewport (which equals
       #root in fullscreen) — but to be safe, force any `position:fixed`
       descendant inside #root to be inset-bound to #root's box. CSS
       `contain: layout paint` on #root establishes a containing block
       for descendants' fixed positioning per the CSS containment spec. */
    #root { contain: layout paint; }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- Keyboard shortcuts.
       F  -> toggle iframe fullscreen
       P  -> pause overlay (synthesises Escape to leverage the React games'
             existing ESC-pause handlers; both Sky Battle and Horizon Runner
             listen for ESC to pause/resume). -->
  <script>
    window.addEventListener("keydown", (e) => {
      if (e.key === "f" || e.key === "F") {
        if (document.fullscreenElement) document.exitFullscreen();
        else document.documentElement.requestFullscreen().catch(() => {});
        e.preventDefault();
      }
      if (e.key === "p" || e.key === "P") {
        // 2026-05-11 — Forward P to the game as Escape so existing pause
        // handlers fire. Dispatch a synthetic KeyboardEvent on window.
        const esc = new KeyboardEvent("keydown", { key: "Escape", code: "Escape", keyCode: 27, which: 27, bubbles: true });
        window.dispatchEvent(esc);
        e.preventDefault();
      }
    });
  </script>
  <!-- 2026-05-08 — Cache-bust pattern (mirrors vector-storm). Browsers
       cached the resolved game.jsx URL across iframe reloads even with the
       worker's no-store header, so each script tag URL must be unique per
       iframe parse. -->
  <script>
    window.__GAME_JSX_URL = "game.jsx?v=" + Date.now();
  </script>
  <script type="module">
    import React from "react";
    import { createRoot } from "react-dom/client";

    // 1. Fetch raw .jsx source (cache-busted)
    const src = await fetch(window.__GAME_JSX_URL).then(r => r.text());

    // 2. Strip the original `import ... from 'react'` and `import ... from
    //    'lucide-react'` lines — we'll re-inject those imports ourselves.
    //    Also strip `export default <Name>` so the transpiled output evaluates
    //    as a top-level component declaration.
    const lucideMatch = src.match(/import\s+\{([^}]+)\}\s+from\s+['"]lucide-react['"]/);
    const lucideNames = lucideMatch ? lucideMatch[1].trim() : "";
    const cleaned = src
      .replace(/^\s*import\s+React.*?from\s+['"]react['"]\s*;?\s*$/m, "")
      .replace(/^\s*import\s+\{[^}]+\}\s+from\s+['"]lucide-react['"]\s*;?\s*$/m, "")
      .replace(/^\s*export\s+default\s+\w+\s*;?\s*$/m, "");

    // 3. Re-inject explicit imports + a default export pointing at the
    //    component name we know lives inside the file.
    const reactImport = 'import React, { useState, useEffect, useRef, useCallback, useMemo } from "react";';
    const lucideImport = lucideNames
      ? 'import { ' + lucideNames + ' } from "lucide-react";'
      : '';
    const wrapped =
      reactImport + "\n" +
      lucideImport + "\n" +
      cleaned + "\n" +
      "export default HorizonRunner;";

    // 4. Babel-transpile JSX → JS. Keep ES modules so dynamic import works.
    const transpiled = Babel.transform(wrapped, {
      presets: [["env", { modules: false, targets: { esmodules: true } }], "react"],
    }).code;

    // 5. Convert to a blob URL and dynamic-import as a real ES module so its
    //    `import` statements resolve through the page's import map.
    const blob = new Blob([transpiled], { type: "text/javascript" });
    const moduleUrl = URL.createObjectURL(blob);
    const mod = await import(moduleUrl);
    const Component = mod.default;

    createRoot(document.getElementById("root")).render(React.createElement(Component));
  </script>
</body>
</html>
