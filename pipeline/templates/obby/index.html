<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{GAME_TITLE}} - ForgeFlow Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e1a;font-family:'Segoe UI',system-ui,sans-serif;color:#fff}
#game-container{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
#hud{position:absolute;top:12px;left:12px;right:12px;z-index:10;pointer-events:none;display:flex;justify-content:space-between}
.hud-item{background:rgba(0,0,0,0.7);padding:8px 14px;border-radius:6px;font-weight:700;font-size:14px}
.hud-item.stage{color:#ffcc00}
.hud-item.deaths{color:#ff3366}
.hud-item.timer{color:#66ddff}
#menu-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,14,26,0.95);z-index:50}
#menu-overlay h1{font-size:52px;background:linear-gradient(135deg,#ffcc00,#ff6600);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
#menu-overlay .controls{color:#888;font-size:14px;text-align:center;margin:16px 0;line-height:1.8}
#menu-overlay button{padding:14px 42px;font-size:20px;font-weight:700;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(135deg,#ffcc00,#ff6600);color:#000;box-shadow:0 4px 16px rgba(255,204,0,0.4);margin-top:12px}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="hud" class="hidden">
  <span class="hud-item stage">Stage <span id="stage-num">1</span></span>
  <span class="hud-item timer">Time <span id="timer">0:00</span></span>
  <span class="hud-item deaths">Deaths <span id="deaths">0</span></span>
</div>
<div id="menu-overlay">
  <h1>{{GAME_TITLE}}</h1>
  <p style="color:#aaa;font-size:14px">{{GAME_TAGLINE}}</p>
  <div class="controls">
    <b>Arrow Keys</b> / <b>WASD</b> to move<br>
    <b>Space</b> to jump (hold for higher)<br>
    <b>Shift</b> to dash<br>
    {{EXTRA_CONTROLS}}
  </div>
  <button id="play-btn">Start Obby</button>
</div>
<div id="game-container"></div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
<script src="juice.js"></script>
<script src="save_load.js"></script>
<script src="gamepad.js"></script>
<script src="game.js"></script>
</body>
</html>
