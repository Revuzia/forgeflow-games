<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{GAME_TITLE}} - ForgeFlow Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e1a;font-family:'Segoe UI',system-ui,sans-serif}
canvas{display:block;width:100%;height:100%}
#hud{position:absolute;top:12px;left:0;right:0;display:flex;justify-content:center;gap:24px;pointer-events:none;z-index:10}
.hud-item{color:#fff;font-size:16px;font-weight:700;text-shadow:0 2px 6px rgba(0,0,0,0.8);padding:8px 16px;background:rgba(0,0,0,0.4);border-radius:12px}
#menu-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,14,26,0.95);z-index:50}
#menu-screen h1{font-size:52px;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,#ff8800,#ff5500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#menu-screen .sub{color:#888;font-size:16px;margin-bottom:20px}
#menu-screen .controls{color:#666;font-size:13px;line-height:2;text-align:center;margin-bottom:20px}
#menu-screen .controls b{color:#ddd}
#menu-screen button{padding:16px 52px;font-size:22px;font-weight:700;border:none;border-radius:14px;cursor:pointer;background:linear-gradient(135deg,#ff8800,#ff5500);color:#fff;box-shadow:0 4px 20px rgba(255,136,0,0.4);transition:transform .15s}
#menu-screen button:hover{transform:scale(1.06)}
#gameover{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,14,26,0.9);z-index:50}
#gameover h1{font-size:48px;color:#ff3366;margin-bottom:12px}
#gameover p{color:#888;font-size:18px;margin-bottom:20px}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="menu-screen">
  <h1>{{GAME_TITLE}}</h1>
  <p class="sub">{{GAME_TAGLINE}}</p>
  <div class="controls">
    <b>WASD</b> / <b>Arrows</b> to move &bull; <b>Space</b> to jump (hold for higher)<br>
    <b>Shift</b> to dash &bull; Stomp enemies from above!<br>
    {{EXTRA_CONTROLS}}
  </div>
  <button id="play-btn">Play</button>
</div>
<div id="hud" class="hidden">
  <div class="hud-item">&#x2764; <span id="lives-text">3</span></div>
  <div class="hud-item">&#x2B50; <span id="score-text">0</span></div>
  <div class="hud-item" id="level-label">Level 1</div>
</div>
<div id="gameover">
  <h1>GAME OVER</h1>
  <p>Score: <span id="go-score">0</span></p>
  <button onclick="location.reload()">Try Again</button>
</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
  }
}
</script>
<script type="module" src="game.js"></script>
</body>
</html>
